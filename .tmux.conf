# --- General Settings ---
unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s
set -g mouse on
set -g base-index 1
set -sg escape-time 0
set -g focus-events on
set -g status-position top

# --- Terminal Fixes (Kitty) ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- Navigation ---
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @continuum-boot 'on'
set -g @continuum-restore 'on'

set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# --- Catppuccin Config (Block Style) ---
# --- Catppuccin Config (v2 syntax) ---
set -g @catppuccin_flavor 'mocha'

# Window appearance
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M:%S"
set -g @catppuccin_status_background "#171717"

# Load catppuccin BEFORE building status bar
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Build status bar manually (v2 way)
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-left-length 100
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_host}"
# --- Initialize TPM (must still be last) ---
run '~/.tmux/plugins/tpm/tpm'

# --- Initialize TPM ---
# This MUST be the last line
run '~/.tmux/plugins/tpm/tpm'
